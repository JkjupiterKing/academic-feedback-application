<div class="login-container">
  <div class="left-panel">
    <div class="marketing-content">
      <!-- You can add an illustration here or just use the background color/shape -->
      <div class="illustration-placeholder">
        <!-- SVG or Image would go here -->
        <img src="/students_studying.jpg" alt="Student Illustration" class="illustration-img">
      </div>
    </div>
  </div>
  <div class="right-panel">
    <div class="login-form-container">
      <div class="login-header">
        <h2>Student Login</h2>
        <p>Hey enter your details to sign in to your account</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <div class="form-group">
          <!-- <label for="email">Email</label> -->
          <input type="email" id="email" name="email" [(ngModel)]="student.email" required #email="ngModel"
            placeholder="Enter your username/email">
          <div *ngIf="email.invalid && (email.dirty || email.touched)" class="error-message">
            Email is required.
          </div>
        </div>

        <div class="form-group">
          <!-- <label for="password">Password</label> -->
          <input type="password" id="password" name="password" [(ngModel)]="student.password" required
            #password="ngModel" placeholder="Enter your password">
          <div *ngIf="password.invalid && (password.dirty || password.touched)" class="error-message">
            Password is required.
          </div>
        </div>

        <div class="form-options">
          <a href="#" class="trouble-login">Having Trouble in sign in?</a>
        </div>

        <button type="submit" class="btn-login">Login In</button>



        <div class="signup-link">
          <p>Don't have an account? <a routerLink="/auth/register">Sign up Now</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
